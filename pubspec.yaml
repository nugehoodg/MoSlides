name: MoSlides
description: MoSlides - Markdown Presentation Editor with MARP

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  provider: ^6.1.2
  webview_flutter: ^4.10.0
  webview_flutter_web: ^0.2.3
  shared_preferences: ^2.3.0
  uuid: ^4.5.1
  printing: ^5.12.0
  cupertino_icons: ^1.0.8
  pdf: ^3.12.0
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
